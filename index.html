
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222d;
    --border: #2e2e3e;
    --text: #f0f0f5;
    --text2: #8888a0;
    --accent: #7c6af7;
    --accent2: #a594f9;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --card-radius: 16px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 90px;
  }

  /* Header */
  .header {
    padding: 24px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 20px; font-weight: 700; }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 14px 16px 0;
  }
  .month-arrow {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px; height: 36px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .month-arrow:hover { border-color: var(--accent); }
  .month-arrow:disabled { opacity: 0.3; cursor: default; }
  .month-arrow:disabled:hover { border-color: var(--border); }
  .month-label {
    font-size: 14px;
    font-weight: 600;
    text-transform: capitalize;
    min-width: 140px;
    text-align: center;
  }

  /* Total card */
  .total-card {
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .total-card:hover { border-color: var(--accent); }
  .total-label {
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .total-label .chevron {
    font-size: 16px;
    transition: transform 0.25s;
    color: var(--text2);
  }
  .total-label .chevron.open { transform: rotate(180deg); }
  .total-bar-wrap {
    height: 10px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .total-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s ease;
  }
  .total-bar-fill.over { background: linear-gradient(90deg, #ef4444, #f87171); }
  .disponible-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .disponible-amount {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }
  .disponible-amount.positive { color: var(--green); }
  .disponible-amount.negative { color: var(--red); }
  .total-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text2);
  }

  /* Categories */
  .categories-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .categories-wrap.open { max-height: 3000px; }
  .categories-inner { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 10px; }

  .cat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .cat-card:hover { border-color: var(--accent); }
  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .cat-name { font-size: 14px; font-weight: 600; }
  .cat-amounts { font-size: 13px; color: var(--text2); }
  .cat-bar-wrap {
    height: 6px;
    background: var(--bg);
    border-radius: 99px;
    overflow: visible;
    position: relative;
  }
  .cat-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease, background 0.3s;
    max-width: 100%;
  }
  .cat-bar-fill.ok { background: var(--green); }
  .cat-bar-fill.warn { background: var(--yellow); }
  .cat-bar-fill.over { background: var(--red); }
  .cat-over-label { font-size: 11px; color: var(--red); margin-top: 4px; }

  /* Recent gastos */
  .section-title {
    padding: 24px 16px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .gastos-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .gasto-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .gasto-item:hover { border-color: var(--accent); }
  .gasto-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .gasto-info { flex: 1; min-width: 0; }
  .gasto-desc { font-size: 14px; font-weight: 500; }
  .gasto-cat { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .gasto-note { font-size: 12px; color: var(--text2); margin-top: 2px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gasto-right { text-align: right; flex-shrink: 0; }
  .gasto-amount { font-size: 15px; font-weight: 600; }
  .gasto-date { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .ingreso-item .gasto-amount { color: var(--green); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
  }

  /* ── BOTTOM MENU ── */
  .bottom-menu {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 430px;
    margin: 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .menu-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    padding: 6px 2px;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
  }
  .menu-btn:hover { background: var(--surface2); color: var(--text); }
  .menu-btn .icon { font-size: 20px; }
  .menu-btn.primary {
    color: white;
  }
  .menu-btn.primary .icon-wrap {
    background: var(--accent);
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: -2px;
  }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 430px;
    max-height: 90vh;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-save {
    flex: 2;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-danger {
    padding: 14px;
    background: transparent;
    border: 1px solid var(--red);
    border-radius: 10px;
    color: var(--red);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    margin-top: 10px;
  }

  /* Lists inside management modals */
  .manage-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .manage-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .manage-item-name { flex: 1; font-size: 14px; font-weight: 500; }
  .manage-item-budget { font-size: 12px; color: var(--text2); }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    font-family: inherit;
  }
  .icon-btn:hover { color: var(--text); }
  .icon-btn.danger:hover { color: var(--red); }

  .subcats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    padding-left: 4px;
  }
  .subcat-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 10px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .subcat-chip button {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
  }
  .add-subcat-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .add-subcat-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .add-subcat-row button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .section-divider {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 20px;
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-size: 14px;
    color: var(--text2);
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen" class="loading">
  <div class="spinner"></div>
  <span>Cargando...</span>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div class="header">
    <span class="header-title">💰 Control de Gastos</span>
  </div>

  <div class="month-nav">
    <button class="month-arrow" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-arrow" id="next-month-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- TOTAL CARD -->
  <div class="total-card" onclick="toggleCategories()">
    <div class="total-label">
      Presupuesto del mes
      <span class="chevron" id="chevron">▾</span>
    </div>
    <div class="total-bar-wrap">
      <div class="total-bar-fill" id="total-bar" style="width:0%"></div>
    </div>
    <div class="disponible-label">Disponible</div>
    <div class="disponible-amount" id="disponible-amount">$0</div>
    <div class="total-meta">
      <span id="gastado-label">Gastado $0</span>
      <span id="presupuesto-label">de $0</span>
    </div>
  </div>

  <!-- CATEGORIES (collapsed) -->
  <div class="categories-wrap" id="categories-wrap">
    <div class="categories-inner" id="categories-inner"></div>
  </div>

  <!-- RECENT -->
  <div class="section-title">Movimientos</div>
  <div class="gastos-list" id="gastos-list"></div>
</div>

<!-- BOTTOM MENU -->
<div class="bottom-menu" id="bottom-menu" style="display:none">
  <button class="menu-btn" onclick="openIngresoModal()">
    <span class="icon">💵</span>
    Ingreso
  </button>
  <button class="menu-btn" onclick="openCatManageModal()">
    <span class="icon">🗂️</span>
    Categorías
  </button>
  <button class="menu-btn primary" onclick="openGastoModal()">
    <span class="icon-wrap">+</span>
  </button>
  <button class="menu-btn" onclick="toggleCategories()">
    <span class="icon">📊</span>
    Resumen
  </button>
  <button class="menu-btn" onclick="openHistorialIngresos()">
    <span class="icon">📜</span>
    Ingresos
  </button>
</div>

<!-- MODAL: NUEVO/EDITAR GASTO -->
<div class="modal-overlay" id="gasto-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="gasto-modal-title">Nuevo gasto</div>
    <input type="hidden" id="g-id">
    <div class="field">
      <label>Categoría</label>
      <select id="g-cat" onchange="onCatChange()"></select>
    </div>
    <div class="field">
      <label>Subcategoría</label>
      <select id="g-subcat"></select>
    </div>
    <div class="field">
      <label>Monto</label>
      <input type="number" id="g-monto" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="field">
      <label>Anotación</label>
      <textarea id="g-nota" placeholder="Detalle u observación (opcional)"></textarea>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="g-fecha">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeGastoModal()">Cancelar</button>
      <button class="btn-save" onclick="saveGasto()">Guardar</button>
    </div>
    <button class="btn-danger" id="g-delete-btn" style="display:none" onclick="deleteGastoConfirm()">Eliminar gasto</button>
  </div>
</div>

<!-- MODAL: NUEVO INGRESO -->
<div class="modal-overlay" id="ingreso-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo ingreso</div>
    <div class="field">
      <label>Descripción</label>
      <input type="text" id="i-desc" placeholder="ej. Quincena, Bono, etc.">
    </div>
    <div class="field">
      <label>Monto</label>
      <input type="number" id="i-monto" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="i-fecha">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeIngresoModal()">Cancelar</button>
      <button class="btn-save" onclick="saveIngreso()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: HISTORIAL DE INGRESOS -->
<div class="modal-overlay" id="historial-ingresos-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ingresos del mes</div>
    <div id="ingresos-list" class="manage-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" style="flex:1" onclick="closeHistorialIngresos()">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL: GESTIONAR CATEGORÍAS -->
<div class="modal-overlay" id="cat-manage-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Categorías</div>
    <div id="cat-manage-list"></div>
    <div class="section-divider">
      <div style="font-size:14px;font-weight:600;margin-bottom:14px;">Nueva categoría</div>
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="new-cat-name" placeholder="ej. Mascotas">
      </div>
      <div class="field">
        <label>Presupuesto mensual</label>
        <input type="number" id="new-cat-budget" placeholder="0.00" inputmode="decimal">
      </div>
      <button class="btn-save" style="width:100%;padding:14px;" onclick="saveNewCategory()">Agregar categoría</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" style="flex:1" onclick="closeCatManageModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL: EDITAR CATEGORÍA (presupuesto + subcategorías) -->
<div class="modal-overlay" id="cat-edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cat-edit-title">Editar categoría</div>
    <input type="hidden" id="ce-id">
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="ce-name">
    </div>
    <div class="field">
      <label>Presupuesto mensual</label>
      <input type="number" id="ce-budget" inputmode="decimal">
    </div>
    <div class="field">
      <label>Subcategorías</label>
      <div class="subcats-row" id="ce-subcats"></div>
      <div class="add-subcat-row">
        <input type="text" id="ce-new-subcat" placeholder="Nueva subcategoría">
        <button onclick="addSubcatToEditing()">Agregar</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCatEditModal()">Cancelar</button>
      <button class="btn-save" onclick="saveCatEdit()">Guardar</button>
    </div>
    <button class="btn-danger" onclick="deleteCategoryConfirm()">Eliminar categoría</button>
  </div>
</div>

<!-- MODAL: DETALLE DE CATEGORÍA -->
<div class="modal-overlay" id="cat-detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cat-detail-title">Categoría</div>
    <div id="cat-detail-summary" style="font-size:13px;color:var(--text2);margin-bottom:16px;"></div>
    <div id="cat-detail-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" style="flex:1" onclick="closeCatDetail()">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, addDoc, onSnapshot, query, orderBy, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBBxzpawYI2V6TUyrDtu6SRG3FhmQ7dZk",
  authDomain: "control-de-gastos-da5f4.firebaseapp.com",
  projectId: "control-de-gastos-da5f4",
  storageBucket: "control-de-gastos-da5f4.firebasestorage.app",
  messagingSenderId: "789894443843",
  appId: "1:789894443843:web:4fe23b0dd1c5c692daf5f6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Todo vive bajo un único grupo compartido (sin login individual)
const GROUP_ID = 'papasmama';

// Categorías y subcategorías iniciales (se siembran solo la primera vez)
const SEED_CATEGORIES = [
  { name: 'Supermercado', budget: 0, subcats: ['Costco', 'Walmart', 'La Comer', 'Mercado', 'Otros'] },
  { name: 'Luca', budget: 0, subcats: ['Pensión Alimenticia', 'Natación', 'Curso de verano', 'Otros'] },
  { name: 'Muchachas', budget: 0, subcats: ['Rosa', 'Laura', 'Otros'] },
  { name: 'Cursos', budget: 0, subcats: ['Amelita', 'Teresita', 'Taty', 'Dibujo', 'Piano', 'Ping Pong'] },
  { name: 'Autos', budget: 0, subcats: ['Seguros', 'Servicios', 'Verificación', 'Gasolina', 'Lavadas'] },
  { name: 'Medicinas', budget: 0, subcats: ['Otros'] },
  { name: 'Otros', budget: 0, subcats: ['Otros'] },
];

const CAT_COLORS = ['#7c6af7','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a78bfa','#4ade80'];

// ── STATE ──
let groupData = null;     // { budget } -- presupuesto = suma de ingresos
let allGastos = [];
let gastos = [];           // filtrados al mes visualizado
let allIngresos = [];
let ingresos = [];          // filtrados al mes visualizado
let categories = [];
let catsOpen = false;
let viewMonth = '';
let editingSubcats = [];    // subcategorías en edición dentro del modal de editar categoría
let unsubGastos = null;
let unsubCats = null;
let unsubGroup = null;
let unsubIngresos = null;

// ── HELPERS ──
const fmt = n => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 }).format(n || 0);
const monthName = (m) => new Date(m + '-02').toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
const todayStr = () => new Date().toISOString().split('T')[0];
const currentMonth = () => new Date().toISOString().slice(0, 7);
const alpha = (a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' });

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (toastTimer) clearTimeout(toastTimer);
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
async function boot() {
  viewMonth = currentMonth();
  updateMonthLabel();

  // Presupuesto compartido (suma de ingresos)
  const groupRef = doc(db, 'groups', GROUP_ID);
  unsubGroup = onSnapshot(groupRef, (s) => {
    groupData = s.exists() ? s.data() : { budget: 0 };
    renderTotals();
  });

  // Categorías — sembrar la primera vez si no existen
  const catsRef = collection(db, 'groups', GROUP_ID, 'categories');
  const catsSnapOnce = await getDoc(doc(db, 'groups', GROUP_ID));
  unsubCats = onSnapshot(catsRef, async (snap) => {
    if (snap.empty && !window.__seeding) {
      window.__seeding = true;
      for (let i = 0; i < SEED_CATEGORIES.length; i++) {
        const c = SEED_CATEGORIES[i];
        await addDoc(catsRef, { name: c.name, budget: c.budget, color: CAT_COLORS[i % CAT_COLORS.length], subcats: c.subcats });
      }
      return; // el siguiente snapshot ya traerá los datos
    }
    categories = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => alpha(a.name, b.name));
    renderAll();
  });

  // Gastos (histórico completo, filtrado por mes visualizado)
  const gastosRef = query(collection(db, 'groups', GROUP_ID, 'gastos'), orderBy('fecha', 'desc'));
  unsubGastos = onSnapshot(gastosRef, (snap) => {
    allGastos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applyMonthFilter();
  });

  // Ingresos (histórico completo, filtrado por mes visualizado)
  const ingresosRef = query(collection(db, 'groups', GROUP_ID, 'ingresos'), orderBy('fecha', 'desc'));
  unsubIngresos = onSnapshot(ingresosRef, (snap) => {
    allIngresos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applyIngresoMonthFilter();
  });

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('bottom-menu').style.display = 'flex';
}

function applyMonthFilter() {
  gastos = allGastos.filter(g => g.mes === viewMonth);
  renderAll();
}
function applyIngresoMonthFilter() {
  ingresos = allIngresos.filter(i => i.mes === viewMonth);
  recalcBudgetFromIngresos();
  renderIngresosList();
}

// El presupuesto del mes es la suma de los ingresos declarados ESE mes
async function recalcBudgetFromIngresos() {
  const total = ingresos.reduce((s, i) => s + (i.monto || 0), 0);
  const groupRef = doc(db, 'groups', GROUP_ID);
  // Solo escribir si cambió, para no generar loops innecesarios
  if (!groupData || groupData.budget !== total) {
    await setDoc(groupRef, { budget: total }, { merge: true });
  } else {
    renderTotals();
  }
}

function updateMonthLabel() {
  document.getElementById('month-label').textContent = monthName(viewMonth);
  document.getElementById('next-month-btn').disabled = (viewMonth >= currentMonth());
}

window.changeMonth = (delta) => {
  const [y, m] = viewMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  const newMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  if (newMonth > currentMonth()) return;
  viewMonth = newMonth;
  updateMonthLabel();
  applyMonthFilter();
  applyIngresoMonthFilter();
};

// ── RENDER ──
function renderAll() {
  renderTotals();
  renderCategories();
  renderGastosList();
}

function renderTotals() {
  if (!groupData) return;
  const budget = groupData.budget || 0;
  const totalGastado = gastos.reduce((s, g) => s + (g.monto || 0), 0);
  const disponible = budget - totalGastado;
  const pct = budget > 0 ? Math.min((totalGastado / budget) * 100, 100) : 0;

  const bar = document.getElementById('total-bar');
  bar.style.width = pct + '%';
  bar.classList.toggle('over', totalGastado > budget);

  const dispEl = document.getElementById('disponible-amount');
  dispEl.className = 'disponible-amount ' + (disponible >= 0 ? 'positive' : 'negative');
  dispEl.textContent = disponible < 0 ? '-' + fmt(Math.abs(disponible)) : fmt(disponible);

  document.getElementById('gastado-label').textContent = `Gastado ${fmt(totalGastado)}`;
  document.getElementById('presupuesto-label').textContent = `de ${fmt(budget)}`;
}

function renderCategories() {
  const inner = document.getElementById('categories-inner');
  if (categories.length === 0) {
    inner.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 0">Sin categorías todavía.</div>';
    return;
  }

  inner.innerHTML = categories.map(cat => {
    const catGastos = gastos.filter(g => g.catId === cat.id);
    const gastado = catGastos.reduce((s, g) => s + (g.monto || 0), 0);
    const budget = cat.budget || 0;
    const pct = budget > 0 ? (gastado / budget) * 100 : 0;
    const over = budget > 0 && gastado > budget;
    const warn = pct >= 80 && !over;
    const barClass = over ? 'over' : warn ? 'warn' : 'ok';
    const barWidth = over ? 100 : pct;

    return `<div class="cat-card" onclick="openCatDetail('${cat.id}')">
      <div class="cat-header">
        <div class="cat-name" style="display:flex;align-items:center;gap:8px;">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${cat.color || '#7c6af7'}"></span>
          ${cat.name}
        </div>
        <div class="cat-amounts">${fmt(gastado)} / ${fmt(budget)}</div>
      </div>
      <div class="cat-bar-wrap">
        <div class="cat-bar-fill ${barClass}" style="width:${barWidth}%;background:${over ? 'var(--red)' : warn ? 'var(--yellow)' : (cat.color || 'var(--green)')}"></div>
      </div>
      ${over ? `<div class="cat-over-label">↑ ${fmt(gastado - budget)} sobre el presupuesto</div>` : ''}
    </div>`;
  }).join('');
}

function renderGastosList() {
  const list = document.getElementById('gastos-list');

  if (gastos.length === 0) {
    const isCurrent = viewMonth === currentMonth();
    list.innerHTML = isCurrent
      ? '<div class="empty-state">Sin gastos este mes.<br>Usa el botón + para agregar uno.</div>'
      : '<div class="empty-state">Sin gastos registrados en este mes.</div>';
    return;
  }

  list.innerHTML = gastos.slice(0, 40).map(g => {
    const cat = categories.find(c => c.id === g.catId);
    const color = cat?.color || '#8888a0';
    const dateStr = g.fecha ? new Date(g.fecha + 'T12:00:00').toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }) : '';
    const subcatTxt = g.subcat ? ` · ${g.subcat}` : '';
    return `<div class="gasto-item" onclick="openGastoModal('${g.id}')">
      <div class="gasto-dot" style="background:${color}"></div>
      <div class="gasto-info">
        <div class="gasto-desc">${cat?.name || 'Sin categoría'}${subcatTxt}</div>
        ${g.nota ? `<div class="gasto-note">${g.nota}</div>` : ''}
      </div>
      <div class="gasto-right">
        <div class="gasto-amount">${fmt(g.monto)}</div>
        <div class="gasto-date">${dateStr}</div>
      </div>
    </div>`;
  }).join('');
}

function renderIngresosList() {
  const list = document.getElementById('ingresos-list');
  if (!list) return;
  if (ingresos.length === 0) {
    list.innerHTML = '<div class="empty-state">Sin ingresos registrados este mes.</div>';
    return;
  }
  list.innerHTML = ingresos.map(i => {
    const dateStr = i.fecha ? new Date(i.fecha + 'T12:00:00').toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }) : '';
    return `<div class="gasto-item ingreso-item">
      <div class="gasto-dot" style="background:var(--green)"></div>
      <div class="gasto-info">
        <div class="gasto-desc">${i.desc || 'Ingreso'}</div>
        <div class="gasto-cat">${dateStr}</div>
      </div>
      <div class="gasto-right">
        <div class="gasto-amount">+${fmt(i.monto)}</div>
      </div>
      <button class="icon-btn danger" onclick="event.stopPropagation();deleteIngreso('${i.id}')">✕</button>
    </div>`;
  }).join('');
}

// ── TOGGLE CATEGORIES ──
window.toggleCategories = () => {
  catsOpen = !catsOpen;
  document.getElementById('categories-wrap').classList.toggle('open', catsOpen);
  document.getElementById('chevron').classList.toggle('open', catsOpen);
  if (catsOpen) document.querySelector('.total-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// ── CATEGORY DETAIL ──
window.openCatDetail = (catId) => {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;

  const monthGastos = allGastos.filter(g => g.catId === catId && g.mes === viewMonth)
    .sort((a, b) => b.fecha.localeCompare(a.fecha));

  const gastado = monthGastos.reduce((s, g) => s + (g.monto || 0), 0);
  const budget = cat.budget || 0;

  document.getElementById('cat-detail-title').innerHTML =
    `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${cat.color};margin-right:8px;"></span>${cat.name}`;
  document.getElementById('cat-detail-summary').textContent =
    `${monthName(viewMonth)} · ${fmt(gastado)} de ${fmt(budget)}`;

  const list = document.getElementById('cat-detail-list');
  if (monthGastos.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:24px 0">Sin gastos en este mes para esta categoría.</div>';
  } else {
    list.innerHTML = monthGastos.map(g => {
      const dateStr = g.fecha ? new Date(g.fecha + 'T12:00:00').toLocaleDateString('es-MX', { day: 'numeric', month: 'short' }) : '';
      return `<div class="gasto-item" onclick="closeCatDetail();openGastoModal('${g.id}')">
        <div class="gasto-dot" style="background:${cat.color}"></div>
        <div class="gasto-info">
          <div class="gasto-desc">${g.subcat || cat.name}</div>
          ${g.nota ? `<div class="gasto-note">${g.nota}</div>` : ''}
        </div>
        <div class="gasto-right">
          <div class="gasto-amount">${fmt(g.monto)}</div>
          <div class="gasto-date">${dateStr}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('cat-detail-modal').classList.add('open');
};
window.closeCatDetail = () => document.getElementById('cat-detail-modal').classList.remove('open');

// ── GASTO MODAL (crear / editar) ──
window.openGastoModal = (gastoId) => {
  const sel = document.getElementById('g-cat');
  sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  document.getElementById('g-id').value = gastoId || '';
  document.getElementById('g-delete-btn').style.display = gastoId ? 'block' : 'none';
  document.getElementById('gasto-modal-title').textContent = gastoId ? 'Editar gasto' : 'Nuevo gasto';

  if (gastoId) {
    const g = allGastos.find(x => x.id === gastoId);
    if (g) {
      sel.value = g.catId;
      onCatChange();
      setTimeout(() => { document.getElementById('g-subcat').value = g.subcat || ''; }, 0);
      document.getElementById('g-monto').value = g.monto;
      document.getElementById('g-nota').value = g.nota || '';
      document.getElementById('g-fecha').value = g.fecha;
    }
  } else {
    onCatChange();
    document.getElementById('g-fecha').value = todayStr();
    document.getElementById('g-monto').value = '';
    document.getElementById('g-nota').value = '';
  }

  document.getElementById('gasto-modal').classList.add('open');
};
window.closeGastoModal = () => document.getElementById('gasto-modal').classList.remove('open');

window.onCatChange = () => {
  const catId = document.getElementById('g-cat').value;
  const cat = categories.find(c => c.id === catId);
  const sel = document.getElementById('g-subcat');
  const subcats = (cat?.subcats || []).slice().sort(alpha);
  sel.innerHTML = subcats.map(s => `<option value="${s}">${s}</option>`).join('');
};

window.saveGasto = async () => {
  const id = document.getElementById('g-id').value;
  const catId = document.getElementById('g-cat').value;
  const subcat = document.getElementById('g-subcat').value;
  const monto = parseFloat(document.getElementById('g-monto').value);
  const nota = document.getElementById('g-nota').value.trim();
  const fecha = document.getElementById('g-fecha').value;

  if (!catId || isNaN(monto) || monto <= 0 || !fecha) {
    showToast('Completa categoría, monto y fecha'); return;
  }

  const mes = fecha.slice(0, 7);
  const data = { catId, subcat, monto, nota, fecha, mes };

  if (id) {
    await updateDoc(doc(db, 'groups', GROUP_ID, 'gastos', id), data);
    showToast('Gasto actualizado ✓');
  } else {
    data.createdAt = new Date().toISOString();
    await addDoc(collection(db, 'groups', GROUP_ID, 'gastos'), data);
    showToast('Gasto guardado ✓');
  }

  closeGastoModal();
};

window.deleteGastoConfirm = async () => {
  const id = document.getElementById('g-id').value;
  if (!id) return;
  if (!confirm('¿Eliminar este gasto?')) return;
  await deleteDoc(doc(db, 'groups', GROUP_ID, 'gastos', id));
  closeGastoModal();
  showToast('Gasto eliminado');
};

// ── INGRESOS ──
window.openIngresoModal = () => {
  document.getElementById('i-desc').value = '';
  document.getElementById('i-monto').value = '';
  document.getElementById('i-fecha').value = todayStr();
  document.getElementById('ingreso-modal').classList.add('open');
};
window.closeIngresoModal = () => document.getElementById('ingreso-modal').classList.remove('open');

window.saveIngreso = async () => {
  const desc = document.getElementById('i-desc').value.trim();
  const monto = parseFloat(document.getElementById('i-monto').value);
  const fecha = document.getElementById('i-fecha').value;

  if (!desc || isNaN(monto) || monto <= 0 || !fecha) {
    showToast('Completa todos los campos'); return;
  }

  const mes = fecha.slice(0, 7);
  await addDoc(collection(db, 'groups', GROUP_ID, 'ingresos'), {
    desc, monto, fecha, mes, createdAt: new Date().toISOString()
  });

  closeIngresoModal();
  showToast('Ingreso guardado ✓');
};

window.openHistorialIngresos = () => {
  renderIngresosList();
  document.getElementById('historial-ingresos-modal').classList.add('open');
};
window.closeHistorialIngresos = () => document.getElementById('historial-ingresos-modal').classList.remove('open');

window.deleteIngreso = async (id) => {
  if (!confirm('¿Eliminar este ingreso? Esto reducirá el presupuesto total.')) return;
  await deleteDoc(doc(db, 'groups', GROUP_ID, 'ingresos', id));
  showToast('Ingreso eliminado');
};

// ── GESTIONAR CATEGORÍAS ──
window.openCatManageModal = () => {
  renderCatManageList();
  document.getElementById('new-cat-name').value = '';
  document.getElementById('new-cat-budget').value = '';
  document.getElementById('cat-manage-modal').classList.add('open');
};
window.closeCatManageModal = () => document.getElementById('cat-manage-modal').classList.remove('open');

function renderCatManageList() {
  const list = document.getElementById('cat-manage-list');
  if (categories.length === 0) {
    list.innerHTML = '<div class="empty-state">Sin categorías.</div>';
    return;
  }
  list.innerHTML = categories.map(cat => `
    <div class="manage-item" style="cursor:pointer" onclick="openCatEditModal('${cat.id}')">
      <span style="width:10px;height:10px;border-radius:50%;background:${cat.color};flex-shrink:0"></span>
      <div class="manage-item-name">${cat.name}<div class="manage-item-budget">${fmt(cat.budget)}/mes · ${(cat.subcats || []).length} subcategorías</div></div>
      <span class="icon-btn">✎</span>
    </div>
  `).join('');
}

window.saveNewCategory = async () => {
  const name = document.getElementById('new-cat-name').value.trim();
  const budget = parseFloat(document.getElementById('new-cat-budget').value) || 0;
  if (!name) { showToast('Ponle un nombre a la categoría'); return; }

  await addDoc(collection(db, 'groups', GROUP_ID, 'categories'), {
    name, budget, color: CAT_COLORS[categories.length % CAT_COLORS.length], subcats: ['Otros']
  });

  document.getElementById('new-cat-name').value = '';
  document.getElementById('new-cat-budget').value = '';
  renderCatManageList();
  showToast('Categoría creada ✓');
};

// ── EDITAR CATEGORÍA (presupuesto + subcategorías) ──
window.openCatEditModal = (catId) => {
  const cat = categories.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('ce-id').value = cat.id;
  document.getElementById('ce-name').value = cat.name;
  document.getElementById('ce-budget').value = cat.budget || 0;
  document.getElementById('cat-edit-title').textContent = `Editar ${cat.name}`;
  editingSubcats = (cat.subcats || []).slice().sort(alpha);
  renderEditingSubcats();
  document.getElementById('cat-edit-modal').classList.add('open');
};
window.closeCatEditModal = () => document.getElementById('cat-edit-modal').classList.remove('open');

function renderEditingSubcats() {
  const wrap = document.getElementById('ce-subcats');
  if (editingSubcats.length === 0) {
    wrap.innerHTML = '<span style="color:var(--text2);font-size:12px;">Sin subcategorías.</span>';
    return;
  }
  wrap.innerHTML = editingSubcats.map((s, idx) =>
    `<span class="subcat-chip">${s}<button onclick="removeEditingSubcat(${idx})">×</button></span>`
  ).join('');
}

window.addSubcatToEditing = () => {
  const input = document.getElementById('ce-new-subcat');
  const val = input.value.trim();
  if (!val) return;
  if (editingSubcats.some(s => s.toLowerCase() === val.toLowerCase())) {
    showToast('Esa subcategoría ya existe'); return;
  }
  editingSubcats.push(val);
  editingSubcats.sort(alpha);
  input.value = '';
  renderEditingSubcats();
};

window.removeEditingSubcat = (idx) => {
  editingSubcats.splice(idx, 1);
  renderEditingSubcats();
};

window.saveCatEdit = async () => {
  const id = document.getElementById('ce-id').value;
  const name = document.getElementById('ce-name').value.trim();
  const budget = parseFloat(document.getElementById('ce-budget').value) || 0;

  if (!name) { showToast('El nombre no puede quedar vacío'); return; }

  await updateDoc(doc(db, 'groups', GROUP_ID, 'categories', id), {
    name, budget, subcats: editingSubcats
  });

  closeCatEditModal();
  renderCatManageList();
  showToast('Categoría actualizada ✓');
};

window.deleteCategoryConfirm = async () => {
  const id = document.getElementById('ce-id').value;
  if (!id) return;
  if (!confirm('¿Eliminar esta categoría? Los gastos ya registrados con ella no se borrarán, pero quedarán sin categoría visible.')) return;
  await deleteDoc(doc(db, 'groups', GROUP_ID, 'categories', id));
  closeCatEditModal();
  closeCatManageModal();
  showToast('Categoría eliminada');
};

boot();
</script>
</body>
</html>
